<html>
    <head>
        <title>Lab Task</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="About">
            <h2>About This Lab</h2>
            <p>In this lab, you will learn basic HTML structure, formatting text, creating simple tables, and using forms for input.</p>
            <table class="table-1">
                <tr>
                    <th>Item Name</th>
                    <th>Quantity</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td class="info">Pencils</td>
                    <td class="info">100</td>
                    <td class="info">In Stock</td>
                </tr>
                <tr>
                    <td class="info">Notebook</td>
                    <td class="info">50</td>
                    <td class="info">Low Stock</td>
                </tr>
                <tr>
                    <td class="info">Markers</td>
                    <td class="info">15</td>
                    <td class="info">In Stock</td>
                </tr>
            </table>
        </div>
        <div class="contact">
            <h1>Contact Information</h1>
            <table class="table-2">
                <tr>
                    <td class="label">Name</td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td class="label">Email</td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td class="label">Message</td>
                    <td><textarea></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td><button>Submit</button></td>
                </tr>
            </table>
        </div>
    </body>
</html>
